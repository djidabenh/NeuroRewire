  let lang = localStorage.getItem("nrw_lang") || "ar";

  function t(key) {
    return (T[lang] && T[lang][key]) || key;
  }

  function getCurrentCategory() {
    const slug = window.location.pathname.split("/").filter(Boolean).pop();
    return CATS.find(cat => cat.ids.includes(slug));
  }

  function updateLangButtons() {
    document.querySelectorAll(".slp").forEach(btn => btn.classList.remove("on"));
    const active = document.getElementById(`lang-${lang}`);
    if (active) active.classList.add("on");
  }

  function renderCategory() {
    const currentCat = getCurrentCategory();
    if (!currentCat) {
      document.getElementById("sg-h").textContent = "Category not found";
      document.getElementById("sg-p").textContent = "";
      document.getElementById("sg-grid").innerHTML = "";
      return;
    }

    document.getElementById("sidebar-tagline").textContent = t("tagline_s");
    document.getElementById("nav-dashboard").textContent = t("nav_dash");
    document.getElementById("nav-games").textContent = t("nav_games");
    document.getElementById("nav-progress").textContent = t("nav_prog");
    document.getElementById("nav-avc").textContent = t("nav_avc");
    document.getElementById("nav-motor").textContent = t("nav_motor");
    document.getElementById("nav-settings").textContent = t("nav_set");
    document.getElementById("logout-text").textContent = t("logout");
    document.getElementById("back-text").textContent = t("back");

    document.getElementById("sg-h").textContent = t(currentCat.nk);
    document.getElementById("sg-p").textContent = t("sg_p");
    document.getElementById("sg-ib").innerHTML = SVG_ICONS[currentCat.ik];

    document.getElementById("sg-grid").innerHTML = currentCat.subs.map((s, i) => `
      <div class="sg-c" onclick="openGame('${s.gid}', '${s.nk}')">
        <div class="sg-num">${i + 1}</div>
        <div class="sg-t">${t(s.nk)}</div>
        <div class="sg-d">${t(s.dk)}</div>
      </div>
    `).join("");
  }

  function setLang(nextLang) {
    localStorage.setItem("nrw_lang", nextLang);
    lang = nextLang;
    document.documentElement.lang = nextLang;
    document.documentElement.dir = nextLang === "ar" ? "rtl" : "ltr";
    updateLangButtons();
    renderCategory();
  }

  function openGame(gid, nk) {
    const gameRoutes = {
  mem_memorize: "/games/memory-images",
  mem_order: "/games/memory-order",
  mem_pairs: "/games/memory-pairs",

  att_odd: "/games/attention-intruder",
  att_click: "/games/attention-click-target",
  att_scene: "/games/attention-scene-search",

  co_catch: "/games/coordination-catch-fruits",
  co_dnd: "/games/coordination-drag-drop",
  co_tap: "/games/coordination-tap-target",

  traj_line: "/games/trajectory-connect-dots",
  traj_shape: "/games/trajectory-draw-shapes",
  traj_path: "/games/trajectory-maze",

  quiz_gen: "/games/quiz-general",
  rapid_cmp: "/games/quiz-rapid-compare",
  rapid_math: "/games/quiz-rapid-math",

  lang_word: "/games/language-word-image",
  lang_complete: "/games/language-complete-word",
  lang_cat: "/games/language-categorize",

  rob_follow: "/games/robot-follow"
};

    if (gameRoutes[gid]) {
      window.location.href = gameRoutes[gid];
      return;
    }

    window.location.href = `/games/${gid}`;
  }

  const savedLang = localStorage.getItem("nrw_lang") || "ar";
  setLang(savedLang);
