<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Neuro ReWire - Rapid Compare</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
<div id="page-app">
  <aside class="sb">
    <div class="sb-hd">
      <div class="sb-sq">
        <svg viewBox="0 0 24 24"><path d="M12 3 4 7v6c0 5 3.4 7.7 8 8 4.6-.3 8-3 8-8V7l-8-4z"/></svg>
      </div>
      <div class="sb-nm">Neuro ReWire <span id="sidebar-subtitle">Rééducation</span></div>
    </div>

        <nav class="sb-nav">
      <div class="ni" onclick="window.location.href='/dashboard'">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span id="nav-dashboard">Accueil</span>
      </div>

      <div class="ni on" onclick="window.location.href='/exercises'">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <path d="M6 12h4M8 10v4"/>
          <circle cx="15" cy="11" r="1" fill="currentColor"/>
          <circle cx="18" cy="13" r="1" fill="currentColor"/>
        </svg>
        <span id="nav-games">Exercices</span>
      </div>

      <div class="ni" onclick="window.location.href='/progress'">
        <svg viewBox="0 0 24 24">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span id="nav-progress">Progrès</span>
      </div>

      <div class="ni" onclick="window.location.href='/avc'">
        <svg viewBox="0 0 24 24">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <span id="nav-avc">Prévention AVC</span>
      </div>

      <div class="ni" onclick="window.location.href='/motor'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 3a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3H6a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3V6a3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3h12a3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/>
        </svg>
        <span id="nav-motor">Moteur & Bilan</span>
      </div>

      <div class="ni" onclick="window.location.href='/settings'">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span id="nav-settings">Paramètres</span>
      </div>
    </nav>

    <div class="sb-bt">
      <div class="sb-ll">
        <button class="slp" id="lang-fr" onclick="setGameLang('fr')">FR</button>
        <button class="slp on" id="lang-ar" onclick="setGameLang('ar')">AR</button>
        <button class="slp" id="lang-en" onclick="setGameLang('en')">EN</button>
      </div>
      <button class="logbtn" onclick="logout()"><span id="logout-text">Logout</span></button>
    </div>
  </aside>

  <main class="main">
    <div class="sec on">
      <div class="back-btn" onclick="leaveGame()"><span id="back-text">Back</span></div>

      <div class="game-hero quiz-hero quiz-hero-compare">
        <div class="game-hero-copy">
          <h2 id="game-title">Comparaison rapide</h2>
          <p id="game-subtitle">Lequel est plus grand ? Répondez vite !</p>
        </div>
        <div class="game-hero-badge">
          <div class="ib lg">
            <svg viewBox="0 0 24 24">
              <path d="M7 7h10M7 17h10"/>
              <path d="M10 5 6 9l4 4"/>
              <path d="M14 5l4 4-4 4"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="game-shell game-shell-memory">
        <div class="game-topbar">
          <div class="game-pill" id="game-round-label">Niveau 1 / 6</div>
          <div class="game-pill game-pill-score" id="game-score-label">Score : 0</div>
        </div>
        <div id="quiz-compare-root"></div>
      </div>
    </div>
  </main>
</div>

<script type="module" src="{{ url_for('static', filename='js/game-quiz-rapid-compare.js') }}"></script>
</body>
</html>
